name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web (typecheck, lint, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Biome check
        run: bun run check

      - name: Typecheck
        working-directory: apps/web
        run: bun run typecheck

      - name: Unit tests
        working-directory: apps/web
        run: bun run test

  api:
    name: API (build, e2e)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: apps/api/go.sum

      - name: Build schema
        run: bash sql/build-schema.sh

      - name: Start MySQL
        run: |
          docker compose up -d mysql
          # Wait for the container to report healthy (schema is applied on first init).
          for i in $(seq 1 60); do
            status=$(docker inspect -f '{{.State.Health.Status}}' "$(docker compose ps -q mysql)" 2>/dev/null || echo starting)
            if [ "$status" = "healthy" ]; then
              echo "MySQL is healthy"; break
            fi
            echo "Waiting for MySQL ($status)..."; sleep 3
          done
          if [ "$status" != "healthy" ]; then
            docker compose logs mysql; exit 1
          fi

      - name: Build
        working-directory: apps/api
        run: go build ./...

      - name: Go vet
        working-directory: apps/api
        run: go vet ./...

      - name: E2E tests
        working-directory: apps/api
        env:
          TC_TEST_INTEGRATION: '1'
        run: go test ./... -count=1
